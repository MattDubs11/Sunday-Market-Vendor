<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manhattan Market Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .popup-title {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .popup-text {
      margin: 4px 0;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([40.7831, -73.9712], 12);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles © Esri'
    }).addTo(map);

    setTimeout(() => {
      map.invalidateSize();
    }, 100);

    const markets = [
      {
        name: "Union Square Greenmarket",
        coords: [40.7359, -73.9911],
        details: `
          <div class="popup-title">
            <a href="market-detail.html?market=union" style="color:#0a1a2f; text-decoration:none;">
              Union Square Greenmarket
            </a>
          </div>
          <div class="popup-text"><strong>Type:</strong> Farmers Market</div>
          <div class="popup-text"><strong>Area:</strong> Union Square</div>
          <div class="popup-text"><strong>Details:</strong> Large outdoor market with local produce, baked goods, and specialty food vendors.</div>
        `
      },
      {
        name: "Chelsea Market",
        coords: [40.7423, -74.0060],
        details: `
          <div class="popup-title">
            <a href="market-detail.html?market=chelsea" style="color:#0a1a2f; text-decoration:none;">
              Chelsea Market
            </a>
          </div>
          <div class="popup-text"><strong>Type:</strong> Indoor Market</div>
          <div class="popup-text"><strong>Area:</strong> Chelsea</div>
          <div class="popup-text"><strong>Details:</strong> Indoor food hall with restaurants, specialty groceries, and retail vendors.</div>
        `
      },
      {
        name: "Essex Market",
        coords: [40.7180, -73.9883],
        details: `
          <div class="popup-title">
            <a href="market-detail.html?market=essex" style="color:#0a1a2f; text-decoration:none;">
              Essex Market
            </a>
          </div>
          <div class="popup-text"><strong>Type:</strong> Public Market</div>
          <div class="popup-text"><strong>Area:</strong> Lower East Side</div>
          <div class="popup-text"><strong>Details:</strong> Historic market with prepared foods, local merchants, and grocery-style vendors.</div>
        `
      }
    ];

    markets.forEach((market) => {
      L.marker(market.coords)
        .addTo(map)
        .bindPopup(market.details);
    });
  </script>
</body>
  <a href="index.html" style="
display:inline-block;
margin:20px;
color:#475569;
text-decoration:none;
font-size:14px;
">
← Back to Home
</a>
</html>
