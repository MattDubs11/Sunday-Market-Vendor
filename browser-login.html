<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Browser</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 40px;
  border-radius: 10px;
  width: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #0a1a2f;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Browser Sign In</h2>

  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">

  <button onclick="login()">Sign In</button>
</div>

<script>
function login() {
  window.location.href = "browser-home.html";
}
</script>

</body>
</html>
