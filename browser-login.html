<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Browser</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

/* LOGIN BOX */
.box {
  background: white;
  padding: 40px;
  border-radius: 10px;
  width: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #0a1a2f;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* CENTER CONTENT */
.container {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}
</style>

</head>

<body>

<!-- BACK BUTTON -->
<a href="index.html" style="
position:absolute;
top:20px;
left:20px;
z-index:1000;
color:#0a1a2f;
text-decoration:none;
font-size:14px;
font-weight:500;
">
← Back
</a>

<!-- MAIN CONTENT -->
<div class="container">

  <h1 style="margin-bottom:10px;">Welcome Back</h1>
  <p style="color:#666; margin-bottom:30px;">
    Sign in to explore vendors, discover products, and plan your next visit.
  </p>

  <div class="box">
    <h2>Browser Sign In</h2>

    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button onclick="login()">Sign In</button>
  </div>

</div>

<script>
function login() {
  window.location.href = "browser-home.html";
}
</script>

</body>
</html>
