<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunday Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #0f172a;
      color: #e2e8f0;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 35px;
    }

    .nav-links li a {
      text-decoration: none;
      color: #cbd5f5;
      font-size: 15px;
      font-weight: 500;
      transition: 0.3s;
    }

    .nav-links li a:hover {
      color: white;
    }

    /* HERO */
    .hero {
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px 60px;
      gap: 60px;
    }

    .hero-text {
      max-width: 550px;
    }

    .hero-text h1 {
      font-size: 56px;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.1;
    }

    .hero-text p {
      font-size: 18px;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .cta-button {
      padding: 12px 22px;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    .cta-button:hover {
      opacity: 0.85;
    }

    /* SIGN IN CARD */
    .signin-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 16px;
      width: 340px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    .signin-box h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    .signin-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.02);
      color: white;
    }

    .signin-box input::placeholder {
      color: #64748b;
    }

    .signin-box button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    .signin-box button:hover {
      opacity: 0.9;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid rgba(255,255,255,0.05);
      color: #64748b;
      font-size: 14px;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-text h1 {
        font-size: 42px;
      }
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">Sunday Market</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
      <li><a href="#">Search</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <h1>Modern Marketplace for Local Vendors</h1>
      <p>Discover curated vendors, explore the market through an interactive map, and experience a smarter way to connect with local businesses.</p>
      <button class="cta-button">Explore Market</button>
    </div>

    <div class="signin-box">
      <h2>Sign In</h2>
      <input type="email" placeholder="Email address">
      <input type="password" placeholder="Password">
      <button>Sign In</button>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 Sunday Market. All rights reserved.
  </footer>

</body>
</html>
