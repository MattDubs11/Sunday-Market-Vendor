<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunday Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #e5e7eb; /* heather grey */
      color: #0a1a2f;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background: #0a1a2f; /* matte navy */
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 35px;
    }

    .nav-links li a {
      text-decoration: none;
      color: #cbd5e1;
      font-size: 15px;
      font-weight: 500;
    }

    .nav-links li a:hover {
      color: white;
    }

    /* HERO */
    .hero {
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px 60px;
      gap: 60px;
    }

    .hero-text h1 {
      font-size: 56px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .hero-text p {
      font-size: 18px;
      color: #475569;
      margin-bottom: 30px;
    }

    .cta-button {
      padding: 12px 22px;
      background: #0a1a2f;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: 500;
      cursor: pointer;
    }

    .cta-button:hover {
      background: #13294b;
    }

    /* SIGN IN */
    .signin-box {
      background: #f9fafb;
      border: 1px solid #d1d5db;
      padding: 30px;
      border-radius: 10px;
      width: 340px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .signin-box h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    .signin-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
    }

    .signin-box button {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #0a1a2f;
      color: white;
      font-weight: 500;
      cursor: pointer;
    }

    .signin-box button:hover {
      background: #13294b;
    }

    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid #d1d5db;
      color: #6b7280;
      background: #e5e7eb;
    }

    @media (max-width: 900px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }
    }

  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">Sunday Market</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
      <li><a href="#">Search</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-text">
      <h1>Modern Marketplace for Local Vendors</h1>
      <p>Discover curated vendors, explore the market through an interactive map, and experience a smarter way to connect with local businesses.</p>
      <button class="cta-button">Explore Market</button>
    </div>

    <div class="signin-box">
      <h2>Sign In</h2>
      <input type="email" placeholder="Email address">
      <input type="password" placeholder="Password">
      <button>Sign In</button>
    </div>
  </section>

  <footer>
    © 2026 Sunday Market. All rights reserved.
  </footer>

</body>
</html>
