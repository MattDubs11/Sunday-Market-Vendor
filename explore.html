<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Explore Markets | Sunday Market</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #e5e7eb;
      color: #0a1a2f;
    }

    .navbar {
      padding: 20px 60px;
      background: #0a1a2f;
      color: white;
      position: relative;
    }

    .navbar::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, transparent, #c6a86b, transparent);
    }

    .container {
      padding: 60px 80px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
    }

    .gold-line {
      width: 80px;
      height: 2px;
      background: #c6a86b;
      margin: 20px 0 40px;
    }

    .markets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    .market-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #d1d5db;
      cursor: pointer;
      transition: 0.3s;
    }

    .market-card:hover {
      transform: translateY(-5px);
    }

    .market-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .market-info {
      padding: 20px;
    }

    .market-info h3 {
      margin-bottom: 8px;
      font-family: 'Playfair Display', serif;
    }
  </style>

</head>

<body>

  <div class="navbar">Sunday Market</div>

  <div class="container">
    <h1>Explore Markets</h1>
    <div class="gold-line"></div>
