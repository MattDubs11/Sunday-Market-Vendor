<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Permit | Sunday Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #e5e7eb;
      color: #0a1a2f;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background: #0a1a2f;
      color: white;
      position: relative;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .navbar::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, transparent, #c6a86b, transparent);
    }

    .back-link {
      display: inline-block;
      margin: 28px 0 0 40px;
      text-decoration: none;
      color: #475569;
      font-size: 15px;
      font-weight: 500;
      transition: 0.3s;
    }

    .back-link:hover {
      color: #0a1a2f;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 20px;
    }

    .form-box {
      background: white;
      width: 100%;
      max-width: 760px;
      padding: 50px;
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.08);
      border: 1px solid #d1d5db;
      position: relative;
    }

    .form-box::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: #c6a86b;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 46px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #0a1a2f;
    }

    .subtitle {
      color: #475569;
      margin-bottom: 35px;
      font-size: 17px;
      max-width: 600px;
      line-height: 1.5;
    }

    .gold-divider {
      width: 70px;
      height: 2px;
      background: #c6a86b;
      margin-bottom: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .full-width {
      grid-column: span 2;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #334155;
    }

    input,
    select {
      width: 100%;
      padding: 14px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      font-size: 14px;
    }

    input[type="file"] {
      background: white;
    }

    .camera-box {
      margin-top: 25px;
      padding: 24px;
      border: 1px dashed #c6a86b;
      border-radius: 8px;
      background: #faf8f4;
    }

    .camera-box h3 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      margin-bottom: 10px;
      color: #0a1a2f;
    }

    .camera-box p {
      color: #475569;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .camera-button {
      background: transparent;
      color: #0a1a2f;
      border: 1px solid #c6a86b;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.3s;
    }

    .camera-button:hover {
      background: #c6a86b;
      color: white;
    }

    video {
      width: 100%;
      margin-top: 18px;
      border-radius: 8px;
      display: none;
      border: 1px solid #d1d5db;
    }

    .submit-btn {
      width: 100%;
      margin-top: 35px;
      padding: 16px;
      background: #0a1a2f;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    .submit-btn:hover {
      background: #13294b;
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .full-width {
        grid-column: span 1;
      }

      .form-box {
        padding: 30px;
      }

      h1 {
        font-size: 34px;
      }
    }
  </style>

</head>
<body>

  <div class="navbar">Sunday Market</div>

<a href="index.html" class="back-link">‹ Back</a>

  <div class="container">
    <div class="form-box">
      <h1>Vendor Application</h1>
      <div class="gold-divider"></div>
      <p class="subtitle">
        Submit your business details, upload permits, or scan documents directly with your device camera for faster onboarding.
      </p>

  <form onsubmit="handleSubmit(event)">

  </div>

  <script>
    function handleSubmit(event) {
      event.preventDefault();
      alert("Application submitted");
    }

    async function startCamera() {
      const video = document.getElementById('cameraPreview');

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });

        video.srcObject = stream;
        video.style.display = 'block';
      } catch (error) {
        alert('Camera access denied or unavailable.');
      }
    }
  </script>

</body>
</html>
