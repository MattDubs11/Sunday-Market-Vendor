<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Market Vendors | Sunday Market</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #e5e7eb;
      color: #0a1a2f;
    }

    .navbar {
      padding: 20px 60px;
      background: #0a1a2f;
      color: white;
      position: relative;
    }

    .navbar::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, transparent, #c6a86b, transparent);
    }

    .container {
      padding: 60px 80px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
    }

    .gold-line {
      width: 80px;
      height: 2px;
      background: #c6a86b;
      margin: 20px 0 40px;
    }

    .vendors {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    .vendor-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #d1d5db;
      transition: 0.3s;
    }

    .vendor-card:hover {
      transform: translateY(-5px);
    }

    .vendor-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .vendor-info {
      padding: 18px;
    }

    .vendor-info h3 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 6px;
    }

    .rating {
      color: #c6a86b;
      margin: 6px 0;
    }

    .review {
      font-size: 14px;
      color: #475569;
    }
  </style>

</head>

<body>

  <div class="navbar">Sunday Market</div>

  <div class="container">
    <h1>Essex Market Vendors</h1>
    <div class="gold-line"></div>

  </div>
<script>
  const params = new URLSearchParams(window.location.search);
  const market = params.get("market");

  const title = document.querySelector("h1");

  if (market === "union") {
    title.innerText = "Union Square Vendors";
  } else if (market === "chelsea") {
    title.innerText = "Chelsea Market Vendors";
  } else if (market === "essex") {
    title.innerText = "Essex Market Vendors";
  }
</script>
</body>
</html>
