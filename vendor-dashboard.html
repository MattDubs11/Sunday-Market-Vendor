<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vendor Dashboard | Sunday Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #e5e7eb;
      color: #0a1a2f;
    }

    /* NAVBAR */
    .navbar {
      padding: 20px 60px;
      background: #0a1a2f;
      color: white;
      position: relative;
    }

    .navbar::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, transparent, #c6a86b, transparent);
    }

    /* BACK */
    .back-link {
      display: inline-block;
      margin: 20px 0 0 40px;
      text-decoration: none;
      color: #475569;
    }

    /* MAIN */
    .container {
      padding: 60px 80px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      margin-bottom: 10px;
    }

    .gold-line {
      width: 80px;
      height: 2px;
      background: #c6a86b;
      margin-bottom: 30px;
    }

    .info-box {
      background: white;
      padding: 30px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      margin-bottom: 40px;
    }

    .vendors {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
    }

    .vendor-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      text-align: center;
    }

    .vendor-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .review-btn {
      margin-top: 10px;
      padding: 8px 12px;
      border: 1px solid #c6a86b;
      background: transparent;
      cursor: pointer;
    }

    .review-btn:hover {
      background: #c6a86b;
      color: white;
    }
  </style>

</head>

<body>

  <div class="navbar">Sunday Market</div>
  <a href="index.html" class="back-link">‹ Back</a>

  <div class="container">
